<!--
  Custom 404 page (RESIL-01).
  Self contained: no external images, fonts, scripts, or styles.
  Uses an inline SVG icon rather than an emoji.
  Replace the brand name, the home link, and adjust copy and colors.
  Make sure the server or framework returns a real 404 status with this page.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Page not found</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #0f1115;
      color: #e6e8eb;
      padding: 24px;
    }
    .panel { max-width: 34rem; text-align: center; }
    .icon { width: 64px; height: 64px; margin: 0 auto 20px; color: #8ab4ff; }
    .code { font-size: 3rem; font-weight: 700; letter-spacing: 0.04em; margin: 0 0 4px; }
    h1 { font-size: 1.4rem; margin: 0 0 8px; }
    p { margin: 0 0 20px; line-height: 1.6; color: #aeb4bd; }
    a.button {
      display: inline-block;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      border: 1px solid #3a3f47;
      background: #1b1e24;
      color: #e6e8eb;
    }
    a.button:hover { background: #232730; }
  </style>
</head>
<body>
  <main class="panel">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      <line x1="8" y1="11" x2="14" y2="11"></line>
    </svg>
    <p class="code">404</p>
    <h1>We could not find that page</h1>
    <p>The page may have moved or no longer exists. Try the home page or use search.</p>
    <a class="button" href="/">Go to the home page</a>
  </main>
</body>
</html>

<!--
  Offline / no internet fallback page (RESIL-02).
  Self contained: no external images, fonts, scripts, or styles.
  Uses an inline SVG icon rather than an emoji.
  Replace the brand name and adjust copy and colors for the project.
  Pair this with a service worker that serves it when the network is unavailable.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>You are offline</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #0f1115;
      color: #e6e8eb;
      padding: 24px;
    }
    .panel { max-width: 32rem; text-align: center; }
    .icon { width: 64px; height: 64px; margin: 0 auto 20px; color: #8ab4ff; }
    h1 { font-size: 1.5rem; margin: 0 0 8px; }
    p { margin: 0 0 20px; line-height: 1.6; color: #aeb4bd; }
    button {
      font: inherit;
      padding: 10px 18px;
      border-radius: 8px;
      border: 1px solid #3a3f47;
      background: #1b1e24;
      color: #e6e8eb;
      cursor: pointer;
    }
    button:hover { background: #232730; }
  </style>
</head>
<body>
  <main class="panel">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M1 1l22 22"></path>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
      <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
      <line x1="12" y1="20" x2="12.01" y2="20"></line>
    </svg>
    <h1>You are offline</h1>
    <p>We could not reach the network. Check your connection, then try again.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
